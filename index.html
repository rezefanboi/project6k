<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 6K</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* Match the original design's background, or black if preferred. Let's use white. */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        .image-container {
            position: relative;
            max-width: 100vw;
            max-height: 100vh;
            /* 1920 / 1080 = 1.7778 */
            aspect-ratio: 1920 / 1080;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .clickable-area {
            position: absolute;
            cursor: pointer;
            z-index: 10;
            /* Uncomment to debug positions */
            /* border: 1px solid rgba(255,0,0,0.5); */
        }
        
        /* Red coloured sign -> canvas */
        #canvas-link {
            left: 46.3%;
            top: 48.7%;
            width: 7.7%;
            height: 13.7%;
        }
        
        /* Blue coloured sign -> collection */
        #collection-link {
            left: 37.0%;
            top: 61.7%;
            width: 8.5%;
            height: 15.1%;
        }
        
        /* Box with 6k -> about */
        #about-link {
            left: 46.7%;
            top: 32.9%;
            width: 6.9%;
            height: 15.1%;
        }
        
        /* AI 'x' sign */
        #ai-sign {
            left: 40.9%;
            top: 42.5%;
            width: 5.4%;
            height: 9.6%;
        }

        /* Tooltips for all clickable areas */
        .clickable-area .tooltip-text {
            visibility: hidden;
            background-color: #222;
            color: #fff;
            text-align: center;
            padding: 6px 12px;
            border-radius: 6px;
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.2s, visibility 0.2s;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        /* Small arrow for tooltip */
        .clickable-area .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #222 transparent transparent transparent;
        }
        
        .clickable-area:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
        
        /* Hide h1 visually but keep for screen readers */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* Mobile View - Zoom in on the pole */
        @media (max-width: 768px) {
            .image-container {
                height: 100vh;
                width: calc(100vh * (1920 / 1080));
                max-width: none;
                max-height: none;
                position: absolute;
                left: 50%;
                /* The pole is horizontally around 42%, so we shift the container to center it */
                transform: translateX(-42%);
            }
            .clickable-area .tooltip-text {
                display: none !important; /* No tooltips on mobile */
            }
        }
    </style>
</head>
<body>
    <h1 class="sr-only">Project 6K</h1>
    
    <div class="image-container">
        <!-- Main UI Image -->
        <img src="Untitled104.png" alt="Project 6K Interactive Navigation">
        
        <!-- Canvas Link (Red sign) -->
        <a href="canvas.html" id="canvas-link" class="clickable-area" aria-label="Go to Canvas">
            <span class="tooltip-text">canvas</span>
        </a>
        
        <!-- Collection Link (Blue sign) -->
        <a href="collection.html" id="collection-link" class="clickable-area" aria-label="Go to Collection">
            <span class="tooltip-text">collection</span>
        </a>
        
        <!-- About Link (6K Box) -->
        <!-- Note: about.html might not exist yet based on previous ls, but creating the link per user request -->
        <a href="about.html" id="about-link" class="clickable-area" aria-label="About Project 6K">
            <span class="tooltip-text">about</span>
        </a>
        
        <!-- AI Sign Tooltip -->
        <div id="ai-sign" class="clickable-area" aria-label="No AI Used">
            <span class="tooltip-text">no ai used</span>
        </div>
    </div>
</body>
</html>
